name: CI

on:
  pull_request:
    branches:
      - main
      - staging

jobs:
  validate:
    name: Validate HTML & links
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install htmlhint
        run: npm install -g htmlhint

      - name: Lint HTML
        run: htmlhint "**/*.html" --ignore "node_modules/**"

      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --verbose
            --no-progress
            --exclude "https://fonts.googleapis.com"
            --exclude "https://fonts.gstatic.com"
            --exclude "mailto:"
            "*.html"
          fail: true
